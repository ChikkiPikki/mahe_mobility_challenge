marker_detector_node:
  ros__parameters:
    # ── General ──────────────────────────────────
    max_marker_dist: 3.5          # max depth (metres) to accept any detection
    min_marker_area_px: 200       # minimum pixel area for ArUco contour
    max_aruco_id: 10              # discard IDs above this

    # ── ArUco marker physical size ───────────────
    aruco_marker_length: 0.4      # metres (side length of the printed marker)
    aruco_box_size: 0.4           # metres (side length of the Gazebo cube)

    # ── Arrow / Sign Detection (blue-first) ──────
    # HSV range for blue arrows (in OpenCV HSV: H 0-180, S 0-255, V 0-255)
    # Source textures: H=110-120, S=51-255, V=188-255
    # Wider range to account for Gazebo lighting variation
    sign_blue_h_low: 95           # hue lower bound
    sign_blue_h_high: 135         # hue upper bound
    sign_blue_s_min: 80           # minimum saturation
    sign_blue_v_min: 60           # minimum value/brightness
    sign_min_blue_area: 400       # minimum blue contour area (px²)

    # Curved arrow (rotate_180) detection
    sign_curved_max_convexity: 0.65   # max area/hull_area ratio (curved arrows are non-convex)
