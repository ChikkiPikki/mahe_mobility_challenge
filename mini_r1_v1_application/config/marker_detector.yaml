marker_detector_node:
  ros__parameters:
    # ── General ──────────────────────────────────
    max_marker_dist: 3.5          # max depth (metres) to accept any detection
    min_marker_area_px: 200       # minimum pixel area for ArUco contour
    max_aruco_id: 10              # discard IDs above this

    # ── ArUco marker physical size ───────────────
    aruco_marker_length: 0.4      # metres (side length of the printed marker)
    aruco_box_size: 0.4           # metres (side length of the Gazebo cube)

    # ── Sign Detection (FastSAM) ────────────────
    # Orange arrow HSV range (for filtering SAM masks)
    sign_arrow_h_low: 0
    sign_arrow_h_high: 25
    sign_arrow_s_min: 150
    sign_arrow_v_min: 100
    sign_min_mask_area: 300       # minimum mask area (px²)
    sign_arrow_ratio_min: 0.30    # min fraction of mask pixels that must be orange
    sign_curved_max_convexity: 0.65

    # SAM processing interval (process every N-th frame, higher = less GPU load)
    sam_process_interval: 3
