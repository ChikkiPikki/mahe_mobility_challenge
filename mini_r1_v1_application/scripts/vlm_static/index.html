<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLM Navigation Brain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }
        h1 {
            font-size: 1.4em;
            color: #00ff88;
            margin-bottom: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 1200px;
        }
        .panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }
        .panel h2 {
            font-size: 0.9em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        #objective-display {
            font-size: 1.2em;
            color: #00ff88;
            min-height: 1.5em;
        }
        #status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .status-moving { background: #1a3a1a; color: #00ff88; }
        .status-stopped { background: #3a3a1a; color: #ffaa00; }
        .status-stuck { background: #3a1a1a; color: #ff4444; }
        .status-error { background: #3a1a1a; color: #ff4444; }
        #reasoning-log {
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.6;
        }
        .reasoning-entry {
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .reasoning-entry .action {
            color: #00aaff;
            font-weight: bold;
        }
        .reasoning-entry .text {
            color: #ccc;
        }
        .reasoning-entry .meta {
            color: #666;
            font-size: 0.8em;
        }
        #observation-log {
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.5;
        }
        .observation-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .stats {
            display: flex;
            gap: 24px;
            font-size: 0.85em;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        .stat-label { color: #666; font-size: 0.8em; }
        .stat-value { color: #00ff88; font-size: 1.2em; }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95em;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .btn-go {
            background: #00ff88;
            color: #000;
        }
        .btn-stop {
            background: #ff4444;
            color: #fff;
        }
        .connection-status {
            font-size: 0.75em;
            color: #666;
            text-align: right;
        }
        .connected { color: #00ff88; }
        .disconnected { color: #ff4444; }
    </style>
</head>
<body>
    <h1>VLM Navigation Brain</h1>

    <div class="controls">
        <input type="text" id="objective-input" placeholder="Enter objective (e.g., 'find the room with the conference table')" />
        <button class="btn-go" onclick="setObjective()">Go</button>
        <button class="btn-stop" onclick="stopRobot()">Stop</button>
    </div>

    <div class="grid">
        <div class="panel">
            <h2>Status</h2>
            <p>Objective: <span id="objective-display">No objective set</span></p>
            <p style="margin-top: 8px;">
                Status: <span id="status-badge" class="status-stopped">STOPPED</span>
                &nbsp; Provider: <span id="provider">—</span>
            </p>
            <div class="stats" style="margin-top: 12px;">
                <div class="stat-item">
                    <span class="stat-label">API Calls</span>
                    <span class="stat-value" id="api-calls">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Position</span>
                    <span class="stat-value" id="position">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Last Action</span>
                    <span class="stat-value" id="last-action">—</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Observation Memory</h2>
            <div id="observation-log"></div>
        </div>

        <div class="panel" style="grid-column: 1 / -1;">
            <h2>Reasoning Stream</h2>
            <div id="reasoning-log"></div>
        </div>
    </div>

    <p class="connection-status" id="conn-status">Connecting...</p>

    <script>
        let ws = null;
        let reconnectTimer = null;

        function connect() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws`);

            ws.onopen = () => {
                document.getElementById('conn-status').textContent = 'Connected';
                document.getElementById('conn-status').className = 'connection-status connected';
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            ws.onclose = () => {
                document.getElementById('conn-status').textContent = 'Disconnected — reconnecting...';
                document.getElementById('conn-status').className = 'connection-status disconnected';
                reconnectTimer = setTimeout(connect, 2000);
            };

            ws.onerror = () => {
                ws.close();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        function handleMessage(data) {
            if (data.type === 'objective_set') {
                document.getElementById('objective-display').textContent = data.objective;
                return;
            }
            if (data.type === 'stopped') {
                updateStatus('stopped');
                return;
            }

            // Reasoning update
            if (data.reasoning) {
                addReasoning(data);
            }
            if (data.observation) {
                addObservation(data.observation);
            }
            if (data.api_calls !== undefined) {
                document.getElementById('api-calls').textContent = data.api_calls;
            }
            if (data.provider) {
                document.getElementById('provider').textContent = data.provider;
            }
            if (data.odom) {
                document.getElementById('position').textContent =
                    `(${data.odom.x.toFixed(1)}, ${data.odom.y.toFixed(1)})`;
            }
            if (data.action) {
                document.getElementById('last-action').textContent = data.action;
            }

            if (data.objective_complete) {
                updateStatus('stopped');
            } else if (data.status === 'stuck') {
                updateStatus('stuck');
            } else if (data.action && data.action !== 'stop') {
                updateStatus('moving');
            }
        }

        function addReasoning(data) {
            const log = document.getElementById('reasoning-log');
            const entry = document.createElement('div');
            entry.className = 'reasoning-entry';
            const speed = data.speed ? ` spd:${data.speed}` : '';
            const angle = data.turn_angle ? ` ang:${data.turn_angle}` : '';
            entry.innerHTML = `
                <span class="action">[${data.action || '?'}${speed}${angle}]</span>
                <span class="text">${data.reasoning || ''}</span>
                <div class="meta">#${data.api_calls || 0} via ${data.provider || '?'}</div>
            `;
            log.insertBefore(entry, log.firstChild);

            // Keep max 50 entries
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }

        function addObservation(obs) {
            const log = document.getElementById('observation-log');
            const entry = document.createElement('div');
            entry.className = 'observation-entry';
            entry.textContent = obs;
            log.insertBefore(entry, log.firstChild);

            while (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }

        function updateStatus(status) {
            const badge = document.getElementById('status-badge');
            badge.textContent = status.toUpperCase();
            badge.className = `status-${status}`;
        }

        function setObjective() {
            const input = document.getElementById('objective-input');
            const objective = input.value.trim();
            if (!objective || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'set_objective', objective }));
            document.getElementById('objective-display').textContent = objective;
            input.value = '';
            updateStatus('moving');
        }

        function stopRobot() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'stop' }));
            updateStatus('stopped');
        }

        // Enter key to submit
        document.getElementById('objective-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') setObjective();
        });

        // Auto-connect
        connect();
    </script>
</body>
</html>
