ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 20.0
    two_d_mode: true
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ODOMETRY INPUT (Wheel Encoders)
    odom0: /r1_mini/odom
    # [X, Y, Z,
    #  roll, pitch, yaw,
    #  X vel, Y vel, Z vel,
    #  roll vel, pitch vel, yaw vel,
    #  X accel, Y accel, Z accel]
    # We mainly trust wheel odometry for X/Y velocity and translation
    odom0_config: [false,  false,  false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false

    # IMU INPUT (Physical Inertia)
    imu0: /r1_mini/imu
    # We heavily trust the IMU for absolute Yaw orientation and angular velocity
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]
    imu0_differential: false
